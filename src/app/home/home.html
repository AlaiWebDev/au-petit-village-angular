<h2>Au petit village</h2>

<p>“Au petit village” est une entreprise qui confectionne des figurines fait main inspirées de la bande
    dessinée Astérix et Obélix.
    Découvrez nos créations artisannales.</p>

<div *ngFor="let product of products">
    <h3>{{ product.name }}</h3>
    <p>Prix : {{ product.price }} €</p>
</div>

<button (click)="sortPriceAsc()">Prix croissant</button>
<button (click)="sortPriceDesc()">Prix décroissant</button>

<input type="text" placeholder="Recherche un produit" (input)="serchProduct ($event)">
